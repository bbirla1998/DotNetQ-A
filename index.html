<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>.NET & SQL Interview Book</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,300&family=Nunito:wght@400;600;700;800&display=swap"
    rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      --cream: #fdf6e3;
      --blue: #1565c0;
      --accent: #e65100;
      --pw: 400px;
      --ph: 540px;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0d0d1a 0%, #1a0a2e 50%, #0d1a2e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      font-family: 'Merriweather', serif;
      padding: 12px 8px 24px;
    }

    /* ── TOPBAR ── */
    .topbar {
      width: 100%;
      max-width: 860px;
      background: rgba(255, 255, 255, .07);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 14px;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .topbar h1 {
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 800
    }

    .topbar h1 span {
      color: #ffa726
    }

    .spread-lbl {
      color: #ffa726;
      font-family: 'Nunito', sans-serif;
      font-size: .8rem;
      font-weight: 700
    }

    /* ── BOOK WRAPPER (book + controls together) ── */
    .book-wrap {
      width: 100%;
      max-width: 860px;
      background: rgba(255, 255, 255, .05);
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0, 0, 0, .7);
    }

    /* ── PROGRESS ── */
    .progress-bar {
      height: 4px;
      background: rgba(255, 255, 255, .1)
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #e65100, #ffa726);
      transition: width .4s ease
    }

    /* ── BOOK STAGE ── */
    .stage {
      display: flex;
      justify-content: center;
      align-items: stretch;
      min-height: var(--ph);
      position: relative;
    }

    /* Spine */
    .spine {
      width: 20px;
      flex-shrink: 0;
      background: linear-gradient(180deg, #4a2c0a, #2c1a0e, #4a2c0a);
      box-shadow: 0 0 8px rgba(0, 0, 0, .8);
      position: relative;
      z-index: 5;
    }

    .spine::before,
    .spine::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 12px;
      bottom: 12px;
      width: 2px;
      background: rgba(255, 200, 100, .25);
      transform: translateX(-50%);
    }

    /* Pages */
    .page {
      flex: 1;
      min-width: 0;
      background: var(--cream);
      overflow: hidden;
      background-image:
        radial-gradient(ellipse at top left, #fff8e1, transparent 55%),
        repeating-linear-gradient(transparent, transparent 27px, rgba(0, 100, 200, .05) 28px);
    }

    .page-left {
      border-radius: 0;
      box-shadow: inset -4px 0 12px rgba(0, 0, 0, .12)
    }

    .page-right {
      box-shadow: inset 4px 0 12px rgba(0, 0, 0, .12)
    }

    /* Flip */
    @keyframes flipL {
      0% {
        transform: rotateY(0)
      }

      100% {
        transform: rotateY(-18deg)
      }
    }

    @keyframes flipR {
      0% {
        transform: rotateY(0)
      }

      100% {
        transform: rotateY(18deg)
      }
    }

    .fl {
      animation: flipL .35s ease forwards
    }

    .fr {
      animation: flipR .35s ease forwards
    }

    /* ── PAGE INNER ── */
    .page-inner {
      padding: 24px 22px 30px;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative
    }

    .chapter-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-family: 'Nunito', sans-serif;
      font-size: .6rem;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 8px
    }

    .badge-dotnet {
      background: #1565c0;
      color: #fff
    }

    .badge-sql {
      background: #2e7d32;
      color: #fff
    }

    .badge-toc {
      background: #6a1b9a;
      color: #fff
    }

    .q-number {
      font-family: 'Nunito', sans-serif;
      font-size: .65rem;
      color: #9e7c44;
      font-weight: 700;
      margin-bottom: 3px
    }

    .q-text {
      font-size: .8rem;
      font-weight: 700;
      color: #1a0a00;
      line-height: 1.5;
      margin-bottom: 8px;
      border-left: 3px solid var(--blue);
      padding-left: 8px
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, #c9a84c, transparent);
      margin: 7px 0
    }

    .ans-en-label {
      font-family: 'Nunito', sans-serif;
      font-size: .58rem;
      font-weight: 800;
      color: #e65100;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 2px
    }

    .ans-en {
      font-size: .72rem;
      color: #2d1a00;
      line-height: 1.65;
      margin-bottom: 6px
    }

    .ans-hi-label {
      font-family: 'Nunito', sans-serif;
      font-size: .58rem;
      font-weight: 800;
      color: #1565c0;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 2px
    }

    .ans-hi {
      font-size: .7rem;
      color: #1a2d00;
      line-height: 1.65;
      font-style: italic
    }

    .code-block {
      background: #1a1a2e;
      color: #a8ff78;
      font-family: 'Courier New', monospace;
      font-size: .58rem;
      padding: 6px 8px;
      border-radius: 4px;
      margin-top: 5px;
      border-left: 3px solid #a8ff78;
      overflow: hidden;
      line-height: 1.5;
      white-space: pre-wrap
    }

    .page-num {
      position: absolute;
      bottom: 8px;
      font-family: 'Nunito', sans-serif;
      font-size: .6rem;
      color: #9e7c44;
      font-weight: 600
    }

    .page-left .page-num {
      left: 22px
    }

    .page-right .page-num {
      right: 22px
    }

    /* Cover */
    .cover-left {
      background: linear-gradient(135deg, #1a0a2e, #2d1654)
    }

    .cover-right {
      background: linear-gradient(135deg, #0d1a2e, #1a3a5c)
    }

    .cover-inner {
      padding: 32px 24px;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center
    }

    .cover-icon {
      font-size: 3.5rem;
      margin-bottom: 14px
    }

    .cover-title {
      font-family: 'Nunito', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      color: #ffa726;
      line-height: 1.3;
      margin-bottom: 8px
    }

    .cover-sub {
      font-family: 'Nunito', sans-serif;
      font-size: .78rem;
      color: rgba(255, 255, 255, .8);
      margin-bottom: 16px
    }

    .cover-badge {
      display: inline-block;
      background: rgba(255, 167, 38, .2);
      border: 1px solid #ffa726;
      color: #ffa726;
      padding: 3px 14px;
      border-radius: 20px;
      font-family: 'Nunito', sans-serif;
      font-size: .7rem;
      font-weight: 700
    }

    .cover-stats {
      display: flex;
      gap: 16px;
      margin-top: 16px
    }

    .stat {
      text-align: center
    }

    .stat-num {
      font-family: 'Nunito', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      color: #fff
    }

    .stat-lbl {
      font-family: 'Nunito', sans-serif;
      font-size: .55rem;
      color: rgba(255, 255, 255, .6);
      text-transform: uppercase;
      letter-spacing: 1px
    }

    /* TOC */
    .toc-title {
      font-family: 'Nunito', sans-serif;
      font-size: .95rem;
      font-weight: 800;
      color: #1a0a00;
      margin-bottom: 10px;
      text-align: center
    }

    .toc-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px dotted #c9a84c;
      cursor: pointer;
      font-size: .68rem;
      color: #2d1a00;
      transition: color .2s
    }

    .toc-item:hover {
      color: #e65100
    }

    .toc-item span:last-child {
      color: #9e7c44;
      font-family: 'Nunito', sans-serif;
      font-size: .6rem;
      font-weight: 700
    }

    .toc-section {
      font-family: 'Nunito', sans-serif;
      font-size: .6rem;
      font-weight: 800;
      color: #1565c0;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 8px 0 4px
    }

    /* ── CONTROLS BAR (inside book-wrap) ── */
    .ctrl-bar {
      background: rgba(0, 0, 0, .55);
      backdrop-filter: blur(10px);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      border-top: 1px solid rgba(255, 255, 255, .08);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 20px;
      border: none;
      cursor: pointer;
      border-radius: 8px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: .82rem;
      transition: all .2s;
    }

    .btn-nav {
      background: linear-gradient(135deg, #e65100, #ff8f00);
      color: #fff;
      box-shadow: 0 3px 10px rgba(230, 81, 0, .35)
    }

    .btn-nav:hover {
      transform: translateY(-1px);
      box-shadow: 0 5px 16px rgba(230, 81, 0, .5)
    }

    .btn-nav:disabled {
      background: #444;
      box-shadow: none;
      transform: none;
      cursor: not-allowed;
      opacity: .6
    }

    .chapter-select {
      background: rgba(255, 255, 255, .1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, .2);
      padding: 8px 10px;
      border-radius: 8px;
      font-family: 'Nunito', sans-serif;
      font-size: .78rem;
      cursor: pointer;
      flex: 1;
      min-width: 0;
    }

    .chapter-select option {
      background: #1a0a2e;
      color: #fff
    }

    .search-box {
      background: rgba(255, 255, 255, .1);
      border: 1px solid rgba(255, 255, 255, .2);
      color: #fff;
      padding: 8px 12px;
      border-radius: 8px;
      font-family: 'Nunito', sans-serif;
      font-size: .78rem;
      flex: 1;
      min-width: 120px;
      outline: none;
    }

    .search-box::placeholder {
      color: rgba(255, 255, 255, .5)
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(230, 81, 0, .95);
      color: #fff;
      padding: 8px 20px;
      border-radius: 8px;
      font-family: 'Nunito', sans-serif;
      font-size: .8rem;
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1
    }

    /* ── MOBILE ── */
    @media(max-width:700px) {
      :root {
        --pw: 100%;
        --ph: 500px
      }

      .page-left,
      .spine {
        display: none
      }

      .page-right {
        border-radius: 0
      }

      .stage {
        min-height: var(--ph)
      }

      .ctrl-bar {
        gap: 6px;
        padding: 8px 10px
      }

      .btn {
        padding: 8px 14px;
        font-size: .76rem
      }

      .topbar h1 {
        font-size: .85rem
      }

      .chapter-select {
        font-size: .72rem
      }

      .search-box {
        font-size: .72rem;
        min-width: 80px
      }
    }

    @media(max-width:420px) {
      :root {
        --ph: 480px
      }

      .btn {
        padding: 7px 10px;
        font-size: .72rem
      }

      .ctrl-bar {
        gap: 4px
      }

      .topbar {
        padding: 8px 12px
      }

      .topbar h1 {
        font-size: .78rem
      }
    }
  </style>
</head>

<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <h1>📚 <span>.NET & SQL</span> Interview Book</h1>
    <div class="spread-lbl" id="spreadLbl">Cover</div>
  </div>

  <!-- BOOK WRAP: book + controls inside one card -->
  <div class="book-wrap">

    <!-- progress -->
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <!-- controls INSIDE book card -->
    <div class="ctrl-bar">
      <button class="btn btn-nav" id="btnPrev" onclick="navigate(-1)">◀ Prev</button>

      <select class="chapter-select" id="chapterSelect" onchange="jumpToChapter(this.value)">
        <option value="0">📖 Chapter</option>
        <option value="cover">Cover</option>
        <option value="toc">Contents</option>
        <option value="dotnet-most">C# Most Imp</option>
        <option value="dotnet-important">C# Important</option>
        <option value="dotnet-advanced">C# Advanced</option>
        <option value="sql-basic">SQL Basic</option>
        <option value="sql-intermediate">SQL Intermediate</option>
        <option value="sql-advanced">SQL Advanced</option>
        <option value="sql-realtime">SQL Real-Time</option>
        <option value="sql-optimization">SQL Optimization</option>
      </select>

      <input class="search-box" id="searchBox" placeholder="🔍 Search..." oninput="searchQuestion(this.value)" />

      <button class="btn btn-nav" id="btnNext" onclick="navigate(1)">Next ▶</button>
    </div>
    <!-- pages -->
    <div class="stage" id="stage">
      <div class="page page-left" id="pageLeft"></div>
      <div class="spine"></div>
      <div class="page page-right" id="pageRight"></div>
    </div>



  </div><!-- /book-wrap -->

  <div class="toast" id="toast"></div>

  <script src="data1.js"></script>
  <script src="data2.js"></script>
  <script src="data3.js"></script>
  <script src="data4.js"></script>
  <script src="data5.js"></script>
  <script src="data6.js"></script>
  <script src="data.js"></script>
  <script>
    let currentSpread = 0, totalSpreads = 0, spreads = [];

    function buildSpreads() {
      spreads = [{ type: 'cover' }, { type: 'toc' }];
      for (let i = 0; i < QUESTIONS.length; i += 2)
        spreads.push({ type: 'questions', left: QUESTIONS[i], right: QUESTIONS[i + 1] || null });
      totalSpreads = spreads.length;
    }

    function render() {
      const s = spreads[currentSpread];
      const L = document.getElementById('pageLeft');
      const R = document.getElementById('pageRight');
      L.className = 'page page-left'; R.className = 'page page-right';
      if (s.type === 'cover') {
        L.innerHTML = coverLeft(); R.innerHTML = coverRight();
        L.className += ' cover-left'; R.className += ' cover-right';
      } else if (s.type === 'toc') {
        L.innerHTML = tocLeft(); R.innerHTML = tocRight();
      } else {
        L.innerHTML = s.left ? renderQ(s.left) : blank();
        R.innerHTML = s.right ? renderQ(s.right) : blank();
      }
      document.getElementById('spreadLbl').textContent = `${currentSpread + 1} / ${totalSpreads}`;
      document.getElementById('progressFill').style.width = ((currentSpread / (totalSpreads - 1)) * 100) + '%';
      document.getElementById('btnPrev').disabled = (currentSpread === 0);
      document.getElementById('btnNext').disabled = (currentSpread === totalSpreads - 1);
    }

    function coverLeft() {
      return `<div class="cover-inner">
  <div class="cover-icon">💻</div>
  <div class="cover-title">.NET & C# Interview</div>
  <div class="cover-sub">Most asked questions with real-world examples in English & Hindi</div>
  <div class="cover-badge">100+ .NET Questions</div>
  <div class="cover-stats">
    <div class="stat"><div class="stat-num">43</div><div class="stat-lbl">Core C#</div></div>
    <div class="stat"><div class="stat-num">19</div><div class="stat-lbl">ASP.NET</div></div>
    <div class="stat"><div class="stat-num">38</div><div class="stat-lbl">Advanced</div></div>
  </div></div>`;
    }

    function coverRight() {
      return `<div class="cover-inner">
  <div class="cover-icon">🗄️</div>
  <div class="cover-title">SQL Interview</div>
  <div class="cover-sub">Basic to Advanced with real-world scenarios & optimization</div>
  <div class="cover-badge">80+ SQL Questions</div>
  <div class="cover-stats">
    <div class="stat"><div class="stat-num">26</div><div class="stat-lbl">Basic</div></div>
    <div class="stat"><div class="stat-num">26</div><div class="stat-lbl">Inter.</div></div>
    <div class="stat"><div class="stat-num">28</div><div class="stat-lbl">Advanced</div></div>
  </div></div>`;
    }

    function tocLeft() {
      const ch = [
        { label: '.NET / C# — Most Important', id: 'dotnet-most', pg: 3 },
        { label: '.NET / C# — Important', id: 'dotnet-important', pg: 16 },
        { label: '.NET / C# — Advanced', id: 'dotnet-advanced', pg: 25 },
      ];
      let h = `<div class="page-inner"><div class="chapter-badge badge-toc">Contents</div>
  <div class="toc-title">📑 Table of Contents</div>
  <div class="toc-section">.NET / C# Questions</div>`;
      ch.forEach(c => h += `<div class="toc-item" onclick="jumpToChapter('${c.id}')"><span>${c.label}</span><span>Pg ${c.pg}</span></div>`);
      return h + `</div>`;
    }

    function tocRight() {
      const ch = [
        { label: 'SQL — Basic Level', id: 'sql-basic', pg: 31 },
        { label: 'SQL — Intermediate', id: 'sql-intermediate', pg: 46 },
        { label: 'SQL — Advanced', id: 'sql-advanced', pg: 57 },
        { label: 'SQL — Real-Time', id: 'sql-realtime', pg: 66 },
        { label: 'SQL — Optimization', id: 'sql-optimization', pg: 74 },
      ];
      let h = `<div class="page-inner"><div class="chapter-badge badge-toc">Contents</div>
  <div class="toc-title">📑 Table of Contents</div>
  <div class="toc-section">SQL Questions</div>`;
      ch.forEach(c => h += `<div class="toc-item" onclick="jumpToChapter('${c.id}')"><span>${c.label}</span><span>Pg ${c.pg}</span></div>`);
      return h + `<div style="margin-top:auto;text-align:center;font-family:'Nunito',sans-serif;font-size:.62rem;color:#9e7c44;padding-top:12px;">📖 172 Questions • English + Hindi<br>Real-world Code Examples</div></div>`;
    }

    function renderQ(q) {
      const badge = q.chapter.startsWith('SQL') ? 'badge-sql' : 'badge-dotnet';
      const code = q.code ? `<div class="code-block">${q.code}</div>` : '';
      return `<div class="page-inner">
  <div class="chapter-badge ${badge}">${q.chapter}</div>
  <div class="q-number">Q${q.num}</div>
  <div class="q-text">${q.q}</div>
  <div class="divider"></div>
  <div class="ans-en-label">🇬🇧 Answer</div>
  <div class="ans-en">${q.en}</div>
  ${code}
  <div class="divider"></div>
  <div class="ans-hi-label">🇮🇳 Hindi</div>
  <div class="ans-hi">${q.hi}</div>
  <div class="page-num">${q.num}</div>
  </div>`;
    }

    function blank() { return `<div class="page-inner" style="display:flex;align-items:center;justify-content:center;"><div style="font-size:3rem;opacity:.3">📖</div></div>`; }

    function navigate(dir) {
      const nx = currentSpread + dir;
      if (nx < 0 || nx >= totalSpreads) return;
      const L = document.getElementById('pageLeft');
      const R = document.getElementById('pageRight');
      if (dir > 0) { L.classList.add('fl'); R.classList.add('fr') }
      else { L.classList.add('fr'); R.classList.add('fl') }
      setTimeout(() => { currentSpread = nx; render(); }, 180);
    }

    function jumpToChapter(id) {
      const map = { cover: 0, toc: 1, 'dotnet-most': 2, 'dotnet-important': 16, 'dotnet-advanced': 25, 'sql-basic': 31, 'sql-intermediate': 46, 'sql-advanced': 57, 'sql-realtime': 66, 'sql-optimization': 74 };
      if (map[id] !== undefined) { currentSpread = map[id]; render(); }
      document.getElementById('chapterSelect').value = 0;
    }

    function searchQuestion(val) {
      if (!val.trim()) return;
      const v = val.toLowerCase();
      const idx = QUESTIONS.findIndex(q => q.q.toLowerCase().includes(v) || q.en.toLowerCase().includes(v));
      if (idx >= 0) { currentSpread = 2 + Math.floor(idx / 2); render(); showToast('Q' + QUESTIONS[idx].num + ': ' + QUESTIONS[idx].q.slice(0, 40) + '...'); }
      else showToast('Not found');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
      if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') navigate(-1);
    });
    let tx = 0;
    document.addEventListener('touchstart', e => tx = e.touches[0].clientX, { passive: true });
    document.addEventListener('touchend', e => { const dx = e.changedTouches[0].clientX - tx; if (Math.abs(dx) > 50) navigate(dx < 0 ? 1 : -1); }, { passive: true });

    buildSpreads(); render();
  </script>
</body>

</html>
